<!DOCTYPE html>
<html>
<head>
    <title>Cloud Share App</title>
    <!-- Load Google APIs -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="box">
        <button id="auth-btn" onclick="handleAuthClick()">Sign In / Connect Drive</button>
    </div>

    <div class="box">
        <h3>Upload Data</h3>
        <input type="text" id="text-input" placeholder="Enter notes"><br><br>
        <input type="file" id="file-input"><br><br>
        <button onclick="processAndUpload()">Compress & Save</button>
        <p id="status"></p>
    </div>

    <div class="box">
        <h3>Retrieve Data</h3>
        <input type="text" id="link-input" placeholder="Paste File ID here">
        <button onclick="loadFile()">Load Data</button>
        <div id="output"></div>
    </div>

    <script>
        const CLIENT_ID = '585974304646-v0jg28j9vvphg9c86t15jore9qclm2c3.apps.googleusercontent.com';
        const SCOPE = 'https://www.googleapis.com/auth/drive.file';
        let tokenClient;

        // 1. Initialize
        window.onload = function() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPE,
                callback: (resp) => { if (resp.access_token) document.getElementById('auth-btn').innerText = "Connected!"; }
            });
        };

        function handleAuthClick() { tokenClient.requestAccessToken(); }

        // 2. Compress and Upload
        async function processAndUpload() {
            const file = document.getElementById('file-input').files[0];
            const text = document.getElementById('text-input').value;
            
            document.getElementById('status').innerText = "Compressing and Uploading...";

            // Combine Data into a Blob (JSON)
            const data = { text: text, fileName: file.name };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });

            // Upload via GAPI
            const metadata = { name: 'my-app-data.json', mimeType: 'application/json' };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', blob);

            fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: new Headers({ 'Authorization': 'Bearer ' + gapi.auth.getToken().access_token }),
                body: form
            }).then(res => res.json()).then(data => {
                document.getElementById('status').innerText = "Saved! File ID: " + data.id;
                alert("Share this ID: " + data.id);
            });
        }

        // 3. Retrieve
        function loadFile() {
            const fileId = document.getElementById('link-input').value;
            fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: { 'Authorization': 'Bearer ' + gapi.auth.getToken().access_token }
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText = "Loaded: " + JSON.stringify(data);
            });
        }
    </script>
</body>
</html>
