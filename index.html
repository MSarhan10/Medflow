<!DOCTYPE html>
<html>
<head>
    <title>Cloud Share App</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        #app-log { background: #000; color: #0f0; padding: 10px; height: 200px; overflow-y: scroll; margin-top: 20px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <button onclick="handleAuthClick()">1. Sign In</button>
    <button onclick="processAndUpload()">2. Upload Data</button>
    <div id="app-log">App Logs will appear here...</div>

    <script>
        const logBox = document.getElementById('app-log');
        function logger(msg) { logBox.innerHTML += `<br>${msg}`; }

        const CLIENT_ID = '585974304646-v0jg28j9vvphg9c86t15jore9qclm2c3.apps.googleusercontent.com';
        let accessToken = null;

        window.onload = () => {
            logger("App Loaded.");
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file',
                callback: (resp) => { 
                    if(resp.access_token) {
                        accessToken = resp.access_token; 
                        logger("SUCCESS: Logged in!");
                    } else {
                        logger("ERROR: Login failed.");
                    }
                }
            });
        };

        function handleAuthClick() { tokenClient.requestAccessToken(); }

        async function processAndUpload() {
            if (!accessToken) { logger("ERROR: Sign in first!"); return; }
            logger("Uploading...");

            try {
                const metadata = { name: 'test.json', mimeType: 'application/json' };
                const data = { content: "hello world" };
                const boundary = 'foo_bar_baz';
                const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(data)}\r\n--${boundary}--`;

                const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': `multipart/related; boundary=${boundary}` },
                    body: body
                });

                if (res.ok) {
                    const result = await res.json();
                    logger("SUCCESS! ID: " + result.id);
                } else {
                    const err = await res.json();
                    logger("API ERROR: " + JSON.stringify(err));
                }
            } catch (err) {
                logger("CATCH ERROR: " + err.message);
            }
        }
    </script>
</body>
</html>
