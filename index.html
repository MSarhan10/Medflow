<!DOCTYPE html>
<html>
<head>
    <title>Cloud Share App</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="box">
        <button id="auth-btn" onclick="handleAuthClick()">Sign In / Connect Drive</button>
    </div>

    <div class="box">
        <h3>Upload Data</h3>
        <input type="text" id="text-input" placeholder="Enter notes"><br><br>
        <button onclick="processAndUpload()">Save to Drive</button>
        <p id="status"></p>
    </div>

    <script>
        const CLIENT_ID = '585974304646-v0jg28j9vvphg9c86t15jore9qclm2c3.apps.googleusercontent.com';
        const SCOPE = 'https://www.googleapis.com/auth/drive.file';
        let accessToken = null; // We store it here!

        // 1. Initialize
        window.onload = function() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPE,
                callback: (resp) => { 
                    accessToken = resp.access_token; 
                    document.getElementById('auth-btn').innerText = "Connected!";
                    console.log("Token obtained!");
                }
            });
        };

        function handleAuthClick() { tokenClient.requestAccessToken(); }

        // 2. The Corrected Upload
        async function processAndUpload() {
            if (!accessToken) { alert("Please sign in first!"); return; }
            
            const text = document.getElementById('text-input').value;
            const status = document.getElementById('status');
            status.innerText = "Uploading...";

            const metadata = { name: 'my-data.json', mimeType: 'application/json' };
            const data = { content: text };
            const boundary = 'foo_bar_baz';

            const body = [
                `--${boundary}`,
                'Content-Type: application/json; charset=UTF-8',
                '',
                JSON.stringify(metadata),
                `--${boundary}`,
                'Content-Type: application/json',
                '',
                JSON.stringify(data),
                `--${boundary}--`
            ].join('\r\n');

            try {
                const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 
                        'Authorization': 'Bearer ' + accessToken,
                        'Content-Type': `multipart/related; boundary=${boundary}`
                    },
                    body: body
                });

                const result = await res.json();
                if (res.ok) {
                    status.innerText = "Saved! ID: " + result.id;
                    alert("Share this ID: " + result.id);
                } else {
                    console.error("API Error:", result);
                    status.innerText = "Error: " + result.error.message;
                }
            } catch (err) {
                status.innerText = "Upload failed. Check console.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
